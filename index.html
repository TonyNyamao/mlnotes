<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AFRICDSA — ML Associate Notebooks</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Sora:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="platform" id="platform">

    <div class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-icon">ml</div>
          <div>
            <div class="logo-text">AFRICDSA</div>
            <div class="logo-sub">ML Associate</div>
          </div>
        </div>
      </div>
      <div class="course-tabs">
        <div class="course-tab active" onclick="switchCourse(0)">C7</div>
        <div class="course-tab" onclick="switchCourse(1)">C8</div>
        <div class="course-tab" onclick="switchCourse(2)">C9</div>
      </div>
      <div class="module-list" id="moduleList"></div>
    </div>

    <div class="main">
      <div class="topbar">
        <div class="kernel-dot" id="kernelDot"></div>
        <div>
          <div class="nb-name" id="nbName">Introduction to Machine Learning</div>
          <div class="nb-meta" id="nbMeta">Python 3 · scikit-learn · pandas</div>
        </div>
        <div class="spacer"></div>
        <button class="run-all-btn" id="runAllBtn" onclick="runAll()">▶ Run All Cells</button>
      </div>

      <div class="notebook-area" id="notebookArea"></div>

      <div class="ai-explain-bar">
        <span class="ai-explain-text" id="aiText">Select a cell and click explain to get a plain-English breakdown of the code.</span>
        <button class="ai-explain-btn" onclick="explainSelected()">✦ Explain selected cell</button>
      </div>
    </div>
  </div>

  <script src="data/courses.js"></script>
  <script src="data/notebooks.js"></script>
  <script src="app.js"></script>
</body>
</html>
